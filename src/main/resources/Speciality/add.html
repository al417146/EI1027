<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Crear nueva especialidad</title>
    <link rel="stylesheet"         href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>


<body>
<main class="container">
    <h1>Nueva especialidad</h1>
    <form class="form-horizontal" th:action="@{/speciality/add}" th:object="${speciality}" method="post">
        <div class="form-group row">
            <label for="speciality" class="control-label col-sm-2">Especialidad: </label>
            <input id="speciality" type="text" th:field="*{speciality}" class="form-control col-sm-4">
        </div>


        <div class="form-group row">
            <label for="idSpeciality" class="control-label col-sm-2">Cód. Especialidad</label>
            <input id="idSpeciality" type="text" th:field="*{idSpeciality}" class="form-control col-sm-4">
        </div>
        <button type="submit" class="btn btn-primary">Añadir especialidad</button>
    </form>
</main>
</body>
</html>
